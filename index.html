<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="stylesheet" href = "style.css">
    </head>
    <body>
    <header>
        <h1>Please login or sign up</h1>
        </header>
    <main>
        <section id="login-box">
            <div class="login-bars">
                <input type="email" id="email-bar" placeholder="mingzi@gmail.com">
                <input type="password" id="password-bar" placeholder="Password">
            </div>
            <div class="login-buttons">
                <button id="login-btn">Log in</button>
                <button id="sign-up-btn">Sign up</button>
            </div>
        </section>
        </main>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script> <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="login.js"></script>
    </body>
</html>
