<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <title>Sign up</title>
        <meta name="viewport" content="width:device-width, initial-scale=1.0">
        <link rel="stylesheet" href = "style.css">
    </head>
    <body>
        <div id="back-click">
            <button id="back-btn"><b>&lt;</b> Back</button>
        </div>
    <header><h1>Please sign up</h1></header>
        <section id="signup-box">
            <div class = "signup-bars">
                <input type="text" id="Name" placeholder="Name">
                <input type="email" id="Email" placeholder="mingzi@gmail.com">
                <input type="password" id="Password" placeholder="Password">
            </div>
            <div class="signup-click">
                <button id="signup-btn">Sign Up</button> 
            </div>
        </section>
    </body>
</html>
